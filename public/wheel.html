<!doctype html>
<html>
<head>
  <title>Virtual Racing Wheel</title>
  <link rel="icon" type="image/png" href="/images/gamepad_icons/favicon_32.png" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" name="viewport" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" type="text/css" href="/css/wheel.css" />
</head>
<body>
  <div id="wheel-controller">

    <div class="top-bar">
      <div id="wheel-player-banner" class="wheel-player-banner wheel-player-connecting">Connecting…</div>
      <div id="wheel-connection-status" class="wheel-connection-status wheel-status-disconnected">○ Disconnected</div>
      <div class="top-bar-controls">
        <select id="preset-select">
          <option value="default">Default Racing</option>
        </select>
        <button id="btn-edit-mode">⚙️ Edit</button>
      </div>
    </div>

    <!-- Main area: Sliders, Wheel, Side Panels -->
    <div class="wheel-main">

      <!-- LEFT: Sliders -->
      <div class="wheel-col wheel-col-sliders">
        <div class="slider-container" id="slider-throttle" data-axis="0x05">
          <div class="slider-label">GAS</div>
          <div class="slider-track"><div class="slider-fill" style="background-color: #4CAF50;"></div></div>
        </div>
        <div class="slider-container" id="slider-brake" data-axis="0x02">
          <div class="slider-label">BRK</div>
          <div class="slider-track"><div class="slider-fill" style="background-color: #F44336;"></div></div>
        </div>
        <div class="slider-container" id="slider-clutch" data-axis="0x01" style="display: none;">
          <div class="slider-label">CLU</div>
          <div class="slider-track"><div class="slider-fill" style="background-color: #2196F3;"></div></div>
        </div>
      </div>

      <!-- CENTER: Wheel and Paddles -->
      <div class="wheel-col wheel-col-center">
        <div id="zone-paddle-left" class="paddle-zone paddle-left"></div>
        <div class="steering-wheel-wrapper">
          <div id="steering-wheel-knob" class="steering-wheel">
            <div id="zone-wheel-center" class="wheel-center-zone"></div>
          </div>
        </div>
        <div id="zone-paddle-right" class="paddle-zone paddle-right"></div>
      </div>

      <!-- RIGHT: Custom buttons -->
      <div class="wheel-col wheel-col-panels">
        <div id="zone-left-panel" class="panel-zone left-panel"></div>
        <div id="zone-right-panel" class="panel-zone right-panel"></div>
      </div>

    </div>

    <!-- Utility bar -->
    <div class="wheel-util-bar">
      <button class="wheel-util-btn" onclick="window.location.href='/'">
        <img src="images/icons/back.svg" style="width: 24px; height: 24px;" />
      </button>
      <button class="wheel-util-btn" id="btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
      <button class="wheel-util-btn" id="btn-dark" onclick="toggleDarkMode()">🌙</button>
    </div>
  </div>

  <!-- Fullscreen Recommendation Popup -->
  <div id="fullscreen-popup" class="modal-overlay">
    <div class="modal-content">
      <p>For best use case, Use full screen</p>
      <button id="btn-fullscreen-yes">Enter Full Screen</button>
      <button id="btn-fullscreen-no">Dismiss</button>
    </div>
  </div>

  <!-- Editor Modal -->
  <div id="editor-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content editor-content">
      <h2>Edit Wheel Settings</h2>
      <label>
        <input type="checkbox" id="edit-clutch-toggle"> Enable Clutch Slider
      </label>
      
      <div class="editor-buttons-list" id="editor-buttons-list">
        <!-- Buttons injected here -->
      </div>
      
      <button id="btn-add-button">+ Add Button</button>
      <hr>
      <div class="editor-actions">
        <input type="text" id="preset-name" placeholder="Preset Name">
        <button id="btn-save-preset">Save Preset</button>
        <button id="btn-close-editor">Close</button>
      </div>
    </div>
  </div>

  <script src="/js/lib/socketio.js"></script>
  <script src="/js/virtual_wheel_client.js"></script>
</body>
</html>
